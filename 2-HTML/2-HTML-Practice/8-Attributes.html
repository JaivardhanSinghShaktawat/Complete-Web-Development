<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attributs In HTML</title>
    <style>
      .container {
        width: 200px;
        height: 200px;
        background-color: #f00;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <!-- Global Attributes  -->
    <p lang="en" contenteditable="true">
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Recusandae,
      placeat unde in ipsam ipsa eveniet, nostrum deleniti pariatur,
      perspiciatis sint sequi. Esse minima suscipit omnis quae mollitia natus
      quos nam!
    </p>

    <div class="container" draggable="true"></div>

    <p data-para="about-coding">coding is fun and i love doing coding</p>

    <!-- Custom attributes  -->
    <p coding="hello world">it is absolutely fun</p>

    <!-- Local Attributes -->
    <a href="https://www.google.com" target="_blank">Google</a>
  </body>
</html>
