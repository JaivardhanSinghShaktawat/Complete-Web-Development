<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic Elements</title>
  </head>
  <body>
    <header>
      <div>
        <img
          src="logo.png"
          alt="logo"
          height="50"
          width="50"
          loading="lazy"
          title="logo"
        />
      </div>
      <nav class="navigation-menu">
        <ul>
          <li><a href="#" target="_blank">Home</a></li>
          <li><a href="#" target="_blank">About</a></li>
          <li><a href="#" target="_blank">Services</a></li>
          <li><a href="#" target="_blank">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="section">It defines some section or area.</section>
    </main>
    <article>
      <header>
        <h1>Article Heading</h1>
      </header>
      <section class="article-information">
        It will contain information about the article
        <details>
          <summary>What is HTML?</summary>
          <mark>HTML</mark> stands for <dfn>HyperText Markup Language</dfn>
        </details>
      </section>
      <address>Author Address</address>
    </article>
    <aside>It contains the sidebar content.</aside>
    <footer>
      Copyright <small>&copy; <time datetime="2025">2025</time></small>
    </footer>
  </body>
</html>
