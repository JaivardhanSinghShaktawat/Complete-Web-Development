<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia Elements</title>
  </head>
  <body>
    <!-- adding audio in our document.  -->
    <audio controls autoplay loop muted preload="auto">
      <source src="audio.mp3" type="audio/mpeg" />
      <source src="audio.ogg" type="audio/ogg" />
      <source src="audio.wav" type="audio/wav" />
      Your Browser Does'nt Support Audio Elements.
    </audio>

    <!-- adding video in our document.  -->
    <video>
      <source src="video.mp4" type="video/mp4" />
      <source src="video.webm" type="video/webm" />
      <source src="video.ogg" type="video/ogg" />
      <track src="video.srt" srclang="en" label="english" kind="subtitles" />
      Your Browser Does'nt Support Video Elements.
    </video>

    <!-- Using embed and object but they are not used  -->
    <embed src="notes.pdf" type="application/pdf" />
    <object data="notes.pdf" type="application/pdf"></object>

    <!-- Using SVG to create 2D graphics and shapes and vectors. -->

    <svg height="500" width="500">
      <circle
        cx="200"
        cy="200"
        r="5"
        fill="red"
        stroke-width="4"
        stroke="gray"
      ></circle>
      <rect
        x="20"
        y="20"
        height="100"
        width="100"
        stroke="purple"
        stroke-width="green"
        fill="hotpink"
      ></rect>
    </svg>
  </body>
</html>
