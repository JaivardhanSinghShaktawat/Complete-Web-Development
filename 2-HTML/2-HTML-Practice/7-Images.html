<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images In HTML</title>
  </head>
  <body>
    <!-- Normal Image Element  -->
    <img
      src="https://images.pexels.com/photos/1107717/pexels-photo-1107717.jpeg"
      alt="nature image"
      height="400"
      width="550"
      title="nature image"
      loading="lazy"
    />

    <!-- Creating a hyperlink using image  -->
    <a href="https://www.pexels.com/search/landscape/" target="_blank">
      <img
        src="https://images.pexels.com/photos/462162/pexels-photo-462162.jpeg"
        alt="landscape image"
        height="400"
        width="550"
        title="landscape image"
        loading="lazy"
        usemap="#landscape-img"
      />
    </a>

    <!-- Creating a hyperlink using map , area and img  -->

    <img
      src="https://images.pexels.com/photos/33041/antelope-canyon-lower-canyon-arizona.jpg"
      alt="landscape image"
      height="400"
      width="550"
      title="landscape image"
      loading="lazy"
      usemap="#landscape-img"
    />

    <map name="landscape-img">
      <area
        shape="rect"
        coords="250,400,0,0"
        title="landscape img"
        href="https:www.pexels.com"
        target="_blank"
      />
    </map>

    <!-- Using picture with source and img to display different images  -->
    <!-- Here we are providing same image with different formats. -->
    <picture>
      <source srcset="./image.webp" type="image/webp" />
      <source srcset="./image.avif" type="image.avif" />
      <img src="image.png" alt="" />
    </picture>

    <br /><br /><br />
    <!-- Here we are providing different images at different resolutions.  -->
    <picture>
      <source
        srcset="
          https://images.pexels.com/photos/158063/bellingrath-gardens-alabama-landscape-scenic-158063.jpeg
        "
        media="(max-width : 457px)"
        type="image/jpeg"
      />
      <source
        srcset="
          https://images.pexels.com/photos/147411/italy-mountains-dawn-daybreak-147411.jpeg
        "
        media="(max-width : 727px)"
        type="image/jpeg"
      />
      <source
        srcset="
          https://images.pexels.com/photos/46160/field-clouds-sky-earth-46160.jpeg
        "
        media="(min-width : 1035px)"
        type="image/jpeg"
      />
      <img
        src="https://images.pexels.com/photos/531767/pexels-photo-531767.jpeg"
        alt="clouds"
        title="clouds"
        height="100%"
        width="500"
        loading="lazy"
      />
    </picture>
  </body>
</html>
